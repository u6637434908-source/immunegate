<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImmuneGate – Session Scoreboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f1117;
      --surface:     #1a1d27;
      --surface2:    #222537;
      --border:      #2e3248;
      --text:        #e8eaf6;
      --text-muted:  #7b82b0;
      --allow:       #22c55e;
      --ask:         #f59e0b;
      --deny:        #ef4444;
      --accent:      #6366f1;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    .main { width: 100%; max-width: 860px; }

    /* ── Header ── */
    .header {
      width: 100%; max-width: 860px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 16px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header-text h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .header-text p  { font-size: 12px; color: var(--text-muted); }

    /* ── Loader Bar ── */
    .loader-bar {
      width: 100%; max-width: 860px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .loader-status {
      font-size: 12px; color: var(--text-muted);
      flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .btn-load {
      padding: 6px 14px;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.4);
      border-radius: 6px;
      color: #a5b4fc;
      font-size: 12px; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn-load:hover { opacity: 0.8; }

    /* ── Card ── */
    .card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .card-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      font-weight: 600;
    }
    .card-body { padding: 16px; }

    /* ── KPI Grid ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 12px;
    }
    .kpi-tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .kpi-icon  { font-size: 20px; margin-bottom: 8px; }
    .kpi-value { font-size: 26px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
    .kpi-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .kpi-sub   { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

    /* ── Charts Row ── */
    .charts-row {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    /* ── Donut ── */
    .donut-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 20px;
    }
    .donut-legend { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    .legend-row   { display: flex; align-items: center; gap: 8px; }
    .legend-dot   { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { font-size: 12px; font-weight: 600; }
    .legend-bar   {
      flex: 1; height: 4px; background: var(--surface2);
      border-radius: 2px; overflow: hidden;
    }
    .legend-bar-fill { height: 100%; border-radius: 2px; }
    .legend-count { font-size: 13px; font-weight: 700; min-width: 20px; text-align: right; }
    .legend-pct   { font-size: 11px; color: var(--text-muted); min-width: 36px; text-align: right; }

    /* ── Rule Bars ── */
    .rule-list { display: flex; flex-direction: column; gap: 18px; }
    .rule-item-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px;
    }
    .rule-id {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px; color: #a5b4fc;
    }
    .rule-count { font-size: 13px; font-weight: 700; }
    .rule-track {
      height: 8px; background: var(--surface2);
      border-radius: 4px; overflow: hidden;
    }
    .rule-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }
    .rule-empty {
      padding: 16px 0;
      color: var(--text-muted);
      font-size: 13px;
      text-align: center;
    }

    /* ── Timeline ── */
    .tl { display: flex; flex-direction: column; }
    .tl-event {
      display: flex; gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
    }
    .tl-event:last-child { border-bottom: none; padding-bottom: 0; }
    .tl-icon {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0; margin-top: 1px;
    }
    .tl-body { flex: 1; min-width: 0; }
    .tl-head {
      display: flex; align-items: center; gap: 6px;
      flex-wrap: wrap; margin-bottom: 2px;
    }
    .tl-ts { font-size: 11px; color: var(--text-muted); margin-left: auto; white-space: nowrap; }
    .tl-detail {
      font-size: 12px; color: var(--text-muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── Badges ── */
    .badge {
      padding: 2px 7px; border-radius: 4px;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .badge-allow { background: rgba(34,197,94,0.15);  color: #22c55e; }
    .badge-ask   { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .badge-deny  { background: rgba(239,68,68,0.15);  color: #ef4444; }
    .badge-info  { background: rgba(99,102,241,0.15); color: #a5b4fc; }

    /* ── Monospace ── */
    .mono { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 12px; }

    /* ── Session footer ── */
    .session-footer {
      width: 100%; max-width: 860px;
      font-size: 11px; color: var(--text-muted);
      text-align: center; margin-top: 8px;
    }

    /* ── Empty / Loading ── */
    .empty { text-align: center; color: var(--text-muted); padding: 32px; }

    /* ── Export controls ── */
    .btn-export {
      padding: 6px 14px;
      background: rgba(34,197,94,0.15);
      border: 1px solid rgba(34,197,94,0.4);
      border-radius: 6px;
      color: #22c55e;
      font-size: 12px; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn-export:hover { opacity: 0.8; }
    .redact-label {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--text-muted);
      cursor: pointer; white-space: nowrap;
      user-select: none;
    }
    .redact-label input { cursor: pointer; accent-color: #f59e0b; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .kpi-grid    { grid-template-columns: repeat(2, 1fr); }
      .charts-row  { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">🛡️</div>
      <div class="header-text">
        <h1>ImmuneGate</h1>
        <p>Security &amp; Trust Layer — Session Scoreboard</p>
      </div>
    </div>
  </div>

  <!-- File Loader -->
  <div class="loader-bar">
    <span class="loader-status" id="loader-status">
      Demo-Daten — lade echten Audit-Log via Datei-Picker oder <code>?file=URL</code>
    </span>
    <button class="btn-load" onclick="document.getElementById('file-input').click()">
      📂 Audit-Log laden
    </button>
    <input type="file" id="file-input" accept=".json" style="display:none" onchange="handleFileLoad(event)">
    <label class="redact-label" title="E-Mail-Adressen im Report schwärzen">
      <input type="checkbox" id="redact-toggle"> 🔒 PII schwärzen
    </label>
    <button class="btn-export" onclick="exportPDF()">📄 PDF Export</button>
  </div>

  <!-- App -->
  <div class="main" id="app">
    <div class="empty">Lade Daten…</div>
  </div>

  <!-- Session footer -->
  <div class="session-footer" id="session-footer"></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════

function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function pct(n, total) {
  return total > 0 ? Math.round(n / total * 100) : 0;
}

function formatTs(iso) {
  if (!iso) return '—';
  try {
    return new Date(iso).toLocaleTimeString('de-DE', {
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
  } catch { return iso; }
}

function formatDate(iso) {
  if (!iso) return '—';
  try {
    return new Date(iso).toLocaleString('de-DE', {
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit'
    });
  } catch { return iso; }
}

// ═══════════════════════════════════════════════════════════════
//  DONUT CHART (pure SVG)
// ═══════════════════════════════════════════════════════════════

function buildDonut(allow, ask, deny) {
  const total = allow + ask + deny;
  const W = 148, cx = 74, cy = 74, r = 52;
  const C = 2 * Math.PI * r;

  const aLen = total > 0 ? (allow / total) * C : 0;
  const sLen = total > 0 ? (ask   / total) * C : 0;
  const dLen = total > 0 ? (deny  / total) * C : 0;

  const gap = (total > 1 && [allow, ask, deny].filter(v => v > 0).length > 1)
    ? Math.min(4, C * 0.012) : 0;

  function shrink(len) { return len > 0 ? Math.max(0, len - gap) : 0; }

  function seg(len, color, offset) {
    if (len < 0.5) return '';
    return `<circle cx="${cx}" cy="${cy}" r="${r}"
      fill="none" stroke="${color}" stroke-width="16"
      stroke-dasharray="${len.toFixed(2)} ${(C - len).toFixed(2)}"
      stroke-dashoffset="${(-offset).toFixed(2)}"
      transform="rotate(-90 ${cx} ${cy})"
    />`;
  }

  const bg   = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#2e3248" stroke-width="16"/>`;
  const segs = [
    seg(shrink(aLen), '#22c55e', 0),
    seg(shrink(sLen), '#f59e0b', aLen),
    seg(shrink(dLen), '#ef4444', aLen + sLen),
  ].join('');

  const label = total === 0 ? '—' : String(total);
  const center = `
    <text x="${cx}" y="${cy - 5}" text-anchor="middle"
      fill="#e8eaf6" font-size="22" font-weight="800"
      font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">${label}</text>
    <text x="${cx}" y="${cy + 13}" text-anchor="middle"
      fill="#7b82b0" font-size="9" letter-spacing="1"
      font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">AKTIONEN</text>`;

  return `<svg width="${W}" height="${W}" viewBox="0 0 ${W} ${W}">${bg}${segs}${center}</svg>`;
}

// ═══════════════════════════════════════════════════════════════
//  TIMELINE
// ═══════════════════════════════════════════════════════════════

function eventMeta(e) {
  const p  = e.payload || {};
  const et = e.event_type;

  if (et === 'risk_evaluated') {
    const d   = (p.decision || '').toLowerCase();
    const map = {
      allow: { bg: 'rgba(34,197,94,0.15)',  color: '#22c55e', icon: '✅', cls: 'badge-allow' },
      ask:   { bg: 'rgba(245,158,11,0.15)', color: '#f59e0b', icon: '⚠️', cls: 'badge-ask'   },
      deny:  { bg: 'rgba(239,68,68,0.15)',  color: '#ef4444', icon: '🛑', cls: 'badge-deny'  },
    };
    const m   = map[d] || { bg: 'rgba(99,102,241,0.15)', color: '#a5b4fc', icon: '⚑', cls: 'badge-info' };
    const ruleTags = (p.matched_rule_ids || [])
      .map(r => `<span class="badge badge-info" style="font-size:9px">${esc(r)}</span>`)
      .join(' ');
    const score = p.risk_score != null ? `Score ${p.risk_score}` : '';
    const contamTag = p.contaminated ? ' · <span style="color:#f97316;font-size:11px">⚠️ kontaminiert</span>' : '';
    return {
      iconBg: m.bg, iconColor: m.color, icon: m.icon,
      title:  `<span class="badge ${m.cls}">${d.toUpperCase()}</span>
               <span class="mono">${esc(p.verb || '')} → ${esc(p.target || '(kein Ziel)')}</span>`,
      detail: [score, ruleTags].filter(Boolean).join(' · ') + contamTag,
    };
  }

  if (et === 'input_received') {
    const sigs = (p.danger_signals || []);
    const sigStr = sigs.length
      ? sigs.map(s => `<span class="badge badge-deny" style="font-size:9px">${esc(s)}</span>`).join(' ')
      : `Hash: <span class="mono">${esc(p.content_hash || '—')}</span>`;
    return {
      iconBg: 'rgba(99,102,241,0.15)', iconColor: '#a5b4fc', icon: '📧',
      title:  `<span class="badge badge-info">INPUT</span> Externe Eingabe (${esc(p.source_kind || '—')})`,
      detail: sigStr,
    };
  }

  if (et === 'tool_call') {
    const ok = p.success;
    return {
      iconBg:    ok ? 'rgba(34,197,94,0.1)' : 'rgba(239,68,68,0.1)',
      iconColor: ok ? '#22c55e' : '#ef4444',
      icon:      ok ? '🔧' : '⛔',
      title:  `<span class="badge ${ok ? 'badge-allow' : 'badge-deny'}">${ok ? 'EXEC' : 'BLOCKED'}</span>
               Tool: <span class="mono">${esc(p.tool || '—')}</span>`,
      detail: esc(p.result_summary || ''),
    };
  }

  if (et === 'human_decision') {
    const ok = p.choice === 'approve';
    return {
      iconBg: 'rgba(168,85,247,0.15)', iconColor: '#d8b4fe', icon: '👤',
      title:  `<span class="badge" style="background:rgba(168,85,247,0.2);color:#d8b4fe">HUMAN</span>
               ${ok ? 'Genehmigt' : (p.choice === 'auto_deny' ? 'Auto-DENY' : 'Abgelehnt')}`,
      detail: p.choice === 'auto_deny' ? 'Non-interactive Modus' : '',
    };
  }

  if (et === 'gate_prompt') {
    return {
      iconBg: 'rgba(245,158,11,0.12)', iconColor: '#f59e0b', icon: '🔔',
      title:  `<span class="badge badge-ask">ASK</span> Approval UI angezeigt`,
      detail: `Aktion-ID: <span class="mono">${esc(p.action_id || '—')}</span>`,
    };
  }

  return {
    iconBg: 'rgba(123,130,176,0.12)', iconColor: '#7b82b0', icon: '●',
    title:  `<span class="badge badge-info">${esc(et)}</span>`,
    detail: '',
  };
}

function buildTimeline(events) {
  const maxShow = 20;
  const visible = [...events].reverse().slice(0, maxShow);

  if (!visible.length) {
    return '<div class="empty">Keine Events in diesem Log.</div>';
  }

  return visible.map(e => {
    const m = eventMeta(e);
    return `
      <div class="tl-event">
        <div class="tl-icon" style="background:${m.iconBg};color:${m.iconColor}">${m.icon}</div>
        <div class="tl-body">
          <div class="tl-head">
            ${m.title}
            <span class="tl-ts">${formatTs(e.timestamp)}</span>
          </div>
          ${m.detail ? `<div class="tl-detail">${m.detail}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════
//  KPI TILE
// ═══════════════════════════════════════════════════════════════

function kpiTile(icon, value, label, sub, color) {
  return `
    <div class="kpi-tile">
      <div class="kpi-icon">${icon}</div>
      <div class="kpi-value" style="color:${color}">${esc(value)}</div>
      <div class="kpi-label">${esc(label)}</div>
      ${sub ? `<div class="kpi-sub">${esc(sub)}</div>` : ''}
    </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  MAIN RENDER
// ═══════════════════════════════════════════════════════════════

let currentData = null;

function render(auditLog) {
  currentData = auditLog;
  const s    = auditLog.session_summary || {};
  const evs  = auditLog.events || [];

  const allow = s.allow_count ?? 0;
  const ask   = s.ask_count   ?? 0;
  const deny  = s.deny_count  ?? 0;
  const total = s.total_actions ?? (allow + ask + deny);

  const denyRate      = s.deny_rate               ?? 0;
  const approvalRate  = s.approval_rate            ?? 0;
  const untrustedRate = s.untrusted_influence_rate ?? 0;
  const topRules      = s.top_rules || [];

  // ── KPI ────────────────────────────────────────────────────
  const denyColor     = deny  > 0 ? '#ef4444' : '#22c55e';
  const untrustedColor = untrustedRate > 50 ? '#f97316'
                       : untrustedRate > 20 ? '#f59e0b' : '#22c55e';
  const kpiHtml = `
    <div class="kpi-grid">
      ${kpiTile('📊', String(total), 'Aktionen gesamt', `${allow} allow · ${ask} ask · ${deny} deny`, '#e8eaf6')}
      ${kpiTile('🛑', denyRate.toFixed(1) + '%', 'Deny Rate',
          `${deny} von ${total} geblockt`, denyColor)}
      ${kpiTile('⚠️', untrustedRate.toFixed(1) + '%', 'Untrusted Influence',
          'unter Fremdeinfluss', untrustedColor)}
      ${kpiTile('👤',
          ask > 0 ? approvalRate.toFixed(1) + '%' : '—',
          'Approval Rate',
          ask > 0 ? `${s.approve_count ?? 0} von ${ask} ASK genehmigt` : 'Keine ASK-Aktionen',
          ask > 0 ? '#22c55e' : '#7b82b0')}
    </div>`;

  // ── Donut + Legend ─────────────────────────────────────────
  const legendItems = [
    { color: '#22c55e', label: 'ALLOW', count: allow },
    { color: '#f59e0b', label: 'ASK',   count: ask   },
    { color: '#ef4444', label: 'DENY',  count: deny  },
  ];
  const legendHtml = legendItems.map(l => {
    const p = pct(l.count, total);
    return `
      <div class="legend-row">
        <div class="legend-dot" style="background:${l.color}"></div>
        <span class="legend-label" style="color:${l.color};min-width:44px">${l.label}</span>
        <div class="legend-bar">
          <div class="legend-bar-fill" style="width:${p}%;background:${l.color}"></div>
        </div>
        <span class="legend-count" style="color:${l.count > 0 ? l.color : 'var(--text-muted)'}">${l.count}</span>
        <span class="legend-pct">${p}%</span>
      </div>`;
  }).join('');

  // ── Rule Bars ──────────────────────────────────────────────
  const maxCount   = topRules.length > 0 ? topRules[0].count : 1;
  const rulePalette = [
    'linear-gradient(90deg,#6366f1,#a855f7)',
    'linear-gradient(90deg,#4f46e5,#7c3aed)',
    'linear-gradient(90deg,#3730a3,#5b21b6)',
  ];
  const medals = ['🥇', '🥈', '🥉'];

  const ruleHtml = topRules.length > 0
    ? topRules.map((rule, i) => {
        const fillPct = Math.round(rule.count / maxCount * 100);
        return `
          <div>
            <div class="rule-item-header">
              <span class="rule-id">${medals[i] || ''} ${esc(rule.rule_id)}</span>
              <span class="rule-count">${rule.count}×</span>
            </div>
            <div class="rule-track">
              <div class="rule-fill" style="width:${fillPct}%;background:${rulePalette[i] || rulePalette[2]}"></div>
            </div>
          </div>`;
      }).join('')
    : '<div class="rule-empty">Keine Regel-Daten.</div>';

  // ── Timeline header ────────────────────────────────────────
  const tlShown = Math.min(evs.length, 20);

  // ── Assemble ───────────────────────────────────────────────
  document.getElementById('app').innerHTML = `
    ${kpiHtml}

    <div class="charts-row">
      <!-- Donut -->
      <div class="card">
        <div class="card-header">Entscheidungs-Verteilung</div>
        <div class="card-body donut-wrap">
          ${buildDonut(allow, ask, deny)}
          <div class="donut-legend">${legendHtml}</div>
        </div>
      </div>

      <!-- Rule Bars -->
      <div class="card">
        <div class="card-header">Top 3 ausgelöste Regeln</div>
        <div class="card-body">
          <div class="rule-list">${ruleHtml}</div>
        </div>
      </div>
    </div>

    <!-- Timeline -->
    <div class="card">
      <div class="card-header">
        Timeline — letzte ${tlShown} Events
        <span style="margin-left:6px;font-size:10px;color:var(--text-muted);">(${evs.length} gesamt, neueste zuerst)</span>
      </div>
      <div class="card-body">

// ═══════════════════════════════════════════════════════════════
//  FILE LOADING
// ═══════════════════════════════════════════════════════════════

function handleFileLoad(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      document.getElementById('loader-status').textContent =
        `✅ ${file.name}  ·  ${(file.size / 1024).toFixed(1)} KB  ·  ${(data.events || []).length} Events`;
      render(data);
    } catch (err) {
      document.getElementById('loader-status').textContent = `❌ Fehler: ${err.message}`;
    }
  };
  reader.readAsText(file);
  evt.target.value = '';
}

function loadData() {
  const params = new URLSearchParams(window.location.search);

  const raw = params.get('data');
  if (raw) {
    try { render(JSON.parse(atob(raw))); return; } catch {}
  }

  const file = params.get('file');
  if (file) {
    fetch(file)
      .then(r => r.json())
      .then(data => {
        document.getElementById('loader-status').textContent =
          `✅ ${file}  ·  ${(data.events || []).length} Events`;
        render(data);
      })
      .catch(e => {
        document.getElementById('loader-status').textContent = `❌ ${e.message} — Demo-Daten geladen`;
        render(DEMO_DATA);
      });
    return;
  }

  render(DEMO_DATA);
}

function redactTarget(str) {
  if (!str) return str;
  // Emails: keep domain, redact user → [GESCHWÄRZT]@domain.com
  return str.replace(/([A-Za-z0-9._%+\-]+)(@[A-Za-z0-9.\-]+\.[A-Za-z]{2,})/gi,
    '[GESCHWÄRZT]$2');
}

function redactData(data) {
  const clone = JSON.parse(JSON.stringify(data));
  for (const ev of clone.events || []) {
    if (ev.event_type === 'risk_evaluated' && ev.payload?.target) {
      ev.payload.target = redactTarget(ev.payload.target);
    }
  }
  return clone;
}

function exportPDF() {
  const data = currentData || DEMO_DATA;
  const redact = document.getElementById('redact-toggle')?.checked ?? false;
  const html = generateReportHTML(data, redact);
  const w = window.open('', '_blank');
  if (!w) {
    alert('Popup blockiert! Bitte Popup-Blocker für diese Seite deaktivieren.');
    return;
  }
  w.document.write(html);
  w.document.close();
  setTimeout(() => { try { w.focus(); w.print(); } catch(e) {} }, 500);
}

  function decBadge(decision) {
    const d = (decision || '').toLowerCase();
    const map = {
      allow: 'background:#dcfce7;color:#166534;border:1px solid #bbf7d0',
      ask:   'background:#fef9c3;color:#854d0e;border:1px solid #fde68a',
      deny:  'background:#fee2e2;color:#991b1b;border:1px solid #fecaca',

    const s2 = map[d] || 'background:#f3f4f6;color:#374151;border:1px solid #e5e7eb';
    return `<span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;${s2}">${esc(decision || '—')}</span>`;
  }

  // ── Timeline rows ──
  const timelineRows = riskEvents.map(e => {
    const p      = e.payload || {};
    const sc     = p.risk_score ?? '—';
    const rules  = (p.matched_rule_ids || []).join(', ');
    const reason = ((p.reasons || [])[0] || '').replace(/^\[.*?\]\s*/, '') || '—';
    const contBg = p.contaminated ? 'background:#fef9c3' : '';

      <td>${decBadge(p.decision)}</td>

      <td style="font-size:10px;color:#6b7280"><code>${esc(rules)}</code></td>

  // ── Danger signal rows ──

    .filter(e => (e.payload?.danger_signals || []).length > 0)

        <td style="white-space:nowrap;color:#6b7280;font-size:11px">${esc(formatTs(e.timestamp))}</td>

    `<tr>
      <td style="width:28px">${medals[i] || ''}</td>
